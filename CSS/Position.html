<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Position</title>
    <style>div{
        width: 100px;
        height: 100px;
        background-color: #3fccd1;
        border: 2px solid rgb(223, 112, 2);
    }

        #parent {
            position: relative;
            width: 300px;
            height: 300px;
            background-color: rgb(4, 4, 4);
            left: 100px;
            top: 0px;
        }

        #child {
            position: absolute;
            top: 200px;
            left: 100px;
            width: 100px;
            height: 100px;
            background-color: rgb(232, 213, 3);
        }
    </style>
</head>
<body>
    <div></div>
    <div id="parent">
        <div id="child"></div>
    </div>
</body>
</html>
