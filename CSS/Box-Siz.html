<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        
        h1{
            text-shadow: 30px 10px 5px rgb(22, 237, 15);
        }
        .nb{
           background-color: aqua;
           width: 100px;
           height: 100px;
           margin: 10px;
           padding: 20px;
           margin-bottom: 20px;
           
        }
         .cb{
           background-color: aqua;
           width: 100px;
           height: 100px;
           margin: 10px;
           padding: 20px;
           box-sizing: content-box;
           outline: 10px deeppink groove;
           box-shadow: 25px 40px blue;
        }
         .bb{
           background-color: aqua;
           width: 100px;
           height: 100px;
           margin: 10px;
           margin-top: 50px;
           padding: 20px;
           box-sizing: border-box;
           border: 2px solid rebeccapurple;
        }
    </style>
</head>
<body>
    <h1>This is Box Sizeing</h1>
    <div class="nb">Normal box</div>
    <div class="cb">Content box</div>
    <div class="bb">Border box</div>
</body>
</html>
