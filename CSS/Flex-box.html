<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex box properties</title>
    <style>
        *{
            margin: 0px;
            padding: 0px;
            box-sizing: border-box;
        }
        .container {
          background-color: white;
          border: 5px solid blue;
          width: 100%;
          height: 500px;
          margin: 0px;
          display: flex;
          align-items:center;
          justify-content: space-evenly;
        }
          div{
            width: 100px;
            height: 100px;
            background-color: burlywood;
            border: 5px solid black;
           text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
          <div>one</div>
          <div>two</div>
          <div>three</div>
          <div>four</div>
    </div>
</body>
</html>
